name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Backend Develop Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (must already exist in ECR and S3 artifact bucket)'
        required: true

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.event.inputs.sha }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: bicycle-app
  # workflow_dispatch: use provided sha; workflow_run: use triggering workflow's head sha
  DEPLOY_SHA: ${{ github.event.inputs.sha || github.event.workflow_run.head_sha }}

jobs:
  # ─── Deploy Staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    # Auto: ci_be completed on push/PR to main OR push/PR to develop
    # Manual: workflow_dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          (github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop')) ||
          (github.event.workflow_run.event == 'pull_request' && (github.event.workflow_run.pull_requests[0].base.ref == 'main' || github.event.workflow_run.pull_requests[0].base.ref == 'develop'))
        )
      )

    outputs:
      alb_dns_name: ${{ steps.tf_outputs.outputs.alb_dns_name }}
      frontend_bucket: ${{ steps.tf_outputs.outputs.frontend_bucket }}
      cluster: ${{ steps.tf_outputs.outputs.cluster }}
      service: ${{ steps.tf_outputs.outputs.service }}
      migration_task: ${{ steps.tf_outputs.outputs.migration_task }}
      ecs_sg: ${{ steps.tf_outputs.outputs.ecs_sg }}
      subnets: ${{ steps.tf_outputs.outputs.subnets }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init - staging
        working-directory: ./infra/envs/staging
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_STAGING }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_STAGING }}"

      - name: Terraform apply - staging
        working-directory: ./infra/envs/staging
        env:
          TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
          TF_VAR_subnet_ids: ${{ secrets.SUBNET_IDS }}
          TF_VAR_lab_role_arn: ${{ secrets.LAB_ROLE_ARN }}
          TF_VAR_docker_image_uri: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.DEPLOY_SHA }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_STAGING }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
        run: terraform apply -auto-approve

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: ./infra/envs/staging
        run: |
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cluster=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "service=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "migration_task=$(terraform output -raw migration_task_definition_arn)" >> "$GITHUB_OUTPUT"
          echo "ecs_sg=$(terraform output -raw ecs_sg_id)" >> "$GITHUB_OUTPUT"
          echo "subnets=$(terraform output -json subnet_ids | jq -r 'join(\",\")')" >> "$GITHUB_OUTPUT"

      - name: Run database migrations - staging
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --task-definition ${{ steps.tf_outputs.outputs.migration_task }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.tf_outputs.outputs.subnets }}],securityGroups=[${{ steps.tf_outputs.outputs.ecs_sg }}],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || (echo "Migration failed!" && exit 1)

      - name: Deploy backend - staging
        run: |
          aws ecs update-service \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --service ${{ steps.tf_outputs.outputs.service }} \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --services ${{ steps.tf_outputs.outputs.service }}

      - name: Deploy frontend - staging
        run: |
          echo "window.ENV_API_URL = 'http://${{ steps.tf_outputs.outputs.alb_dns_name }}';" > config.js

          aws s3 sync \
            s3://bicycle-frontend-artifacts-${{ secrets.AWS_ACCOUNT_ID }}/v${{ env.DEPLOY_SHA }}/ \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/

          aws s3 cp config.js \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/config.js \
            --cache-control "no-store"

      - name: Acceptance tests - staging
        run: |
          curl -f --retry 5 --retry-delay 5 \
            http://${{ steps.tf_outputs.outputs.alb_dns_name }}/health

  # ─── Deploy Production ────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init - production
        working-directory: ./infra/envs/production
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_PROD }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_PROD }}"

      - name: Terraform apply - production
        working-directory: ./infra/envs/production
        env:
          TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
          TF_VAR_subnet_ids: ${{ secrets.SUBNET_IDS }}
          TF_VAR_lab_role_arn: ${{ secrets.LAB_ROLE_ARN }}
          TF_VAR_docker_image_uri: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.DEPLOY_SHA }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
        run: terraform apply -auto-approve

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: ./infra/envs/production
        run: |
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cluster=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "service=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "migration_task=$(terraform output -raw migration_task_definition_arn)" >> "$GITHUB_OUTPUT"
          echo "ecs_sg=$(terraform output -raw ecs_sg_id)" >> "$GITHUB_OUTPUT"
          echo "subnets=$(terraform output -json subnet_ids | jq -r 'join(\",\")')" >> "$GITHUB_OUTPUT"

      - name: Run database migrations - production
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --task-definition ${{ steps.tf_outputs.outputs.migration_task }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.tf_outputs.outputs.subnets }}],securityGroups=[${{ steps.tf_outputs.outputs.ecs_sg }}],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || (echo "Migration failed!" && exit 1)

      - name: Deploy backend - production
        run: |
          aws ecs update-service \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --service ${{ steps.tf_outputs.outputs.service }} \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --services ${{ steps.tf_outputs.outputs.service }}

      - name: Deploy frontend - production
        run: |
          echo "window.ENV_API_URL = 'http://${{ steps.tf_outputs.outputs.alb_dns_name }}';" > config.js

          aws s3 sync \
            s3://bicycle-frontend-artifacts-${{ secrets.AWS_ACCOUNT_ID }}/v${{ env.DEPLOY_SHA }}/ \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/

          aws s3 cp config.js \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/config.js \
            --cache-control "no-store"

      - name: Smoke tests - production
        run: |
          curl -f --retry 5 --retry-delay 5 \
            http://${{ steps.tf_outputs.outputs.alb_dns_name }}/health
