name: CI Frontend Develop Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  publish-to-artifact-store:
    runs-on: ubuntu-latest
    needs: [test-and-build]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init - shared
        working-directory: ./infra/shared
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_SHARED }}" \
            -backend-config="key=shared/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_SHARED }}"

      - name: Terraform apply - shared
        working-directory: ./infra/shared
        run: terraform apply -auto-approve

      - name: Upload versioned artifact
        run: |
          aws s3 sync ./frontend/dist/ \
            s3://bicycle-frontend-artifacts-${{ secrets.AWS_ACCOUNT_ID }}/v${{ github.sha }}/

      - name: Upload stable artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          aws s3 sync ./frontend/dist/ \
            s3://bicycle-frontend-artifacts-${{ secrets.AWS_ACCOUNT_ID }}/stable/ \
            --delete
