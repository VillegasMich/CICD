name: Panic Button - Rollback Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA to rollback to (leave empty to use :stable)"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: bicycle-app

jobs:
  rollback-production-manual:
    name: Rollback Production (Manual)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform init - production
        working-directory: ./infra/envs/production
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET_PROD }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE_PROD }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: ./infra/envs/production
        run: |
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cluster=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "service=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"

      - name: Resolve target SHA
        id: target
        run: |
          INPUT_SHA="${{ github.event.inputs.sha }}"

          if [ -n "$INPUT_SHA" ]; then
            echo "Using provided SHA: $INPUT_SHA"
            echo "sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "No SHA provided, resolving :stable from ECR..."

            DIGEST=$(aws ecr describe-images \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --image-ids imageTag=stable \
              --query 'imageDetails[0].imageDigest' \
              --output text)

            STABLE_SHA=$(aws ecr describe-images \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --image-ids imageDigest=$DIGEST \
              --query 'imageDetails[0].imageTags[?@!=`stable`] | [0]' \
              --output text)

            if [ -z "$STABLE_SHA" ] || [ "$STABLE_SHA" = "None" ]; then
              echo "ERROR: No stable image found in ECR. Cannot rollback." >&2
              exit 1
            fi

            echo "Resolved :stable to SHA: $STABLE_SHA"
            echo "sha=${STABLE_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform apply - rollback
        working-directory: ./infra/envs/production
        env:
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_subnet_ids: ${{ vars.SUBNET_IDS }}
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_docker_image_uri: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.target.outputs.sha }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
        run: terraform apply -auto-approve

      - name: Force ECS service redeploy
        run: |
          aws ecs update-service \
            --cluster ${{ steps.tf_outputs.outputs.cluster }} \
            --service ${{ steps.tf_outputs.outputs.service }} \
            --force-new-deployment

          echo "Waiting for rollback deployment to stabilize..."
          TIMEOUT=1800
          INTERVAL=15
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-services \
              --cluster ${{ steps.tf_outputs.outputs.cluster }} \
              --services ${{ steps.tf_outputs.outputs.service }} \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState' \
              --output text)
            echo "  Primary rollout state: ${STATUS} (${ELAPSED}s elapsed)"
            [ "$STATUS" = "COMPLETED" ] && break
            [ "$STATUS" = "FAILED" ] && (echo "Rollback deployment failed!" && exit 1)
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          [ $ELAPSED -ge $TIMEOUT ] && (echo "Timed out waiting for rollback stability" && exit 1)
          echo "Rollback deployment complete."

      - name: Rollback frontend
        run: |
          echo "window.ENV_API_URL = 'http://${{ steps.tf_outputs.outputs.alb_dns_name }}';" > config.js

          aws s3 sync \
            s3://bicycle-frontend-artifacts-${{ vars.AWS_ACCOUNT_ID }}/v${{ steps.target.outputs.sha }}/ \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/ \
            --delete

          aws s3 cp config.js \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/config.js \
            --cache-control "no-store"

      - name: Smoke test
        run: |
          curl -f --retry 5 --retry-delay 5 \
            http://${{ steps.tf_outputs.outputs.alb_dns_name }}/api/v1/health

      - name: Summary
        if: always()
        run: |
          echo "### 🚨 Manual Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rolled back to | \`${{ steps.target.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | http://${{ steps.tf_outputs.outputs.alb_dns_name }} |" >> $GITHUB_STEP_SUMMARY
